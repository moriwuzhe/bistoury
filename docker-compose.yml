version: '3.8'

services:
  zookeeper:
    image: zookeeper:3.8
    restart: always
    ports:
      - "2181:2181"
    environment:
      ZOO_MY_ID: 1
      ZOO_SERVERS: server.1=zookeeper:2888:3888;2181
    volumes:
      - zookeeper_data:/data
      - zookeeper_logs:/datalog

  mysql:
    image: mysql:8.0
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: bistoury@2026
      MYSQL_DATABASE: bistoury
      MYSQL_USER: bistoury
      MYSQL_PASSWORD: bistoury@2026
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile-backend
    restart: always
    ports:
      - "8081:8081"
      - "3333:3333"
    depends_on:
      - zookeeper
      - mysql
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bistoury?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: bistoury
      SPRING_DATASOURCE_PASSWORD: bistoury@2026
      BISTOURY_ZOOKEEPER_ADDRESS: zookeeper:2181

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  zookeeper_data:
  zookeeper_logs:
  mysql_data:
